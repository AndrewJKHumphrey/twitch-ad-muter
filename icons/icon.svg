<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#0e0e10"/>

  <!-- Speaker body (rectangle) -->
  <rect x="14" y="34" width="20" height="30" rx="4" fill="#9147ff"/>

  <!-- Speaker cone (trapezoid flaring to the right) -->
  <path d="M34 34 L60 14 L60 80 L34 64 Z" fill="#9147ff"/>

  <!-- Mute X -->
  <line x1="72" y1="24" x2="108" y2="68" stroke="#9147ff" stroke-width="11" stroke-linecap="round"/>
  <line x1="108" y1="24" x2="72"  y2="68" stroke="#9147ff" stroke-width="11" stroke-linecap="round"/>

  <!-- "Ad" label -->
  <text
    x="64" y="118"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="36"
    font-weight="900"
    fill="#efeff1"
    text-anchor="middle"
    letter-spacing="3"
  >Ad</text>

</svg>
