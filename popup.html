<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiet Twitch</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 240px;
      padding: 16px;
      margin: 0;
      background: #0e0e10;
      color: #efeff1;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 600;
      color: #bf94ff;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #18181b;
      margin-bottom: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.ad    { background: #f04f23; box-shadow: 0 0 6px #f04f23; }
    .dot.clear { background: #00c7ac; box-shadow: 0 0 6px #00c7ac; }
    .dot.idle  { background: #555; }

    .row-text { font-size: 13px; flex: 1; }

    .toggle-row {
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .toggle-label { font-size: 13px; color: #efeff1; }
    .toggle-sub   { font-size: 11px; color: #adadb8; margin-top: 2px; }

    .switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #3a3a3d;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #efeff1;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #9147ff; }
    input:checked + .slider::before { transform: translateX(16px); }

    .stat {
      font-size: 12px;
      color: #adadb8;
      padding: 6px 12px;
      background: #18181b;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .stat span { color: #efeff1; font-weight: 600; }

    .lang-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #18181b;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .lang-label {
      font-size: 12px;
      color: #adadb8;
      flex: 1;
    }

    .lang-select {
      font-size: 12px;
      background: #2a2a2d;
      color: #efeff1;
      border: 1px solid #3a3a3d;
      border-radius: 4px;
      padding: 2px 4px;
      cursor: pointer;
    }

    .footer {
      margin-top: 2px;
      text-align: right;
    }

    .help-link {
      font-size: 11px;
      color: #adadb8;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .help-link:hover { color: #bf94ff; }
  </style>
</head>
<body>
  <h2 data-i18n="extName">Quiet Twitch</h2>

  <div class="row">
    <div class="dot idle" id="dot"></div>
    <div class="row-text" id="status">Loading&hellip;</div>
  </div>

  <label class="row toggle-row">
    <div>
      <div class="toggle-label" data-i18n="popup_muteInactive_label">Mute inactive tabs</div>
      <div class="toggle-sub" data-i18n="popup_muteInactive_sub">Unmutes when you switch to the tab</div>
    </div>
    <div class="switch">
      <input type="checkbox" id="muteInactiveToggle">
      <span class="slider"></span>
    </div>
  </label>

  <label class="row toggle-row" style="padding-left: 24px;">
    <div>
      <div class="toggle-label" data-i18n="popup_muteOnNonStream_label">Keep muted on non-stream pages</div>
      <div class="toggle-sub" data-i18n="popup_muteOnNonStream_sub">Stays muted on home or directory pages</div>
    </div>
    <div class="switch">
      <input type="checkbox" id="muteOnNonStreamToggle">
      <span class="slider"></span>
    </div>
  </label>

  <label class="row toggle-row">
    <div>
      <div class="toggle-label" data-i18n="popup_switchOnAd_label">Switch tab on ad</div>
      <div class="toggle-sub" data-i18n="popup_switchOnAd_sub">Switches to another Twitch tab when an ad plays</div>
    </div>
    <div class="switch">
      <input type="checkbox" id="switchOnAdToggle">
      <span class="slider"></span>
    </div>
  </label>

  <label class="row toggle-row" style="padding-left: 24px;">
    <div>
      <div class="toggle-label" data-i18n="popup_returnOnAdEnd_label">Return when ad ends</div>
      <div class="toggle-sub" data-i18n="popup_returnOnAdEnd_sub">Switches back to the Primary Tab, if set, after the ad finishes in the Primary Tab</div>
    </div>
    <div class="switch">
      <input type="checkbox" id="returnOnAdEndToggle">
      <span class="slider"></span>
    </div>
  </label>

  <label class="row toggle-row">
    <div>
      <div class="toggle-label" data-i18n="popup_closeOnStreamEnd_label">Close tab when stream ends</div>
      <div class="toggle-sub" data-i18n="popup_closeOnStreamEnd_sub">Closes after a 5-second grace period</div>
    </div>
    <div class="switch">
      <input type="checkbox" id="closeOnStreamEndToggle">
      <span class="slider"></span>
    </div>
  </label>

  <label class="row toggle-row">
    <div>
      <div class="toggle-label" data-i18n="popup_autoReload_label">Auto-reload on crash</div>
      <div class="toggle-sub" data-i18n="popup_autoReload_sub">Reloads up to 3&times; per 10 min if stream freezes Note: This feature is difficult to test, it may not work as expected</div>
    </div>
    <div class="switch">
      <input type="checkbox" id="autoReloadToggle">
      <span class="slider"></span>
    </div>
  </label>


<div class="stat"><span data-i18n="popup_statLabel">Ads muted this session:</span> <span id="count">0</span></div>

  <div class="row toggle-row" id="hiddenStreamersHeader" style="cursor:pointer;">
    <div class="toggle-label" data-i18n="popup_hiddenStreamers_label">Hidden Streamers</div>
    <span id="hiddenStreamersCount" style="font-size:11px;color:#adadb8;"></span>
  </div>
  <div id="hiddenStreamersList" style="display:none; padding:4px 12px 8px; background:#18181b; border-radius:6px; margin-bottom:8px;"></div>

  <div class="lang-row">
    <span class="lang-label" data-i18n="langLabel">Language</span>
    <select class="lang-select" id="langSelect">
      <option value="en">English</option>
      <option value="es">Espa&ntilde;ol</option>
      <option value="fr">Fran&ccedil;ais</option>
      <option value="de">Deutsch</option>
      <option value="pt">Português (BR)</option>
      <option value="ko">한국어</option>
      <option value="ru">Русский</option>
      <option value="ja">日本語</option>
      <option value="zh">中文（简体）</option>
      <option value="tr">Türkçe</option>
    </select>
  </div>

  <div class="footer">
    <button class="help-link" id="helpBtn" data-i18n="popup_helpBtn">Help &amp; settings guide</button>
  </div>

  <script src="translations.js"></script>
  <script src="popup.js"></script>
</body>
</html>
